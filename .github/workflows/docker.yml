name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      pob_ref:
        description: "PathOfBuilding ref to include"
        required: false
        default: "api-stdio"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pob-mcp
  POB_REF: ${{ inputs.pob_ref || 'api-stdio' }}

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --build-arg POB_REF="${POB_REF}" \
            -t "${IMAGE_NAME}:ci" \
            .

      - name: Smoke image
        run: |
          docker run --rm \
            --entrypoint node \
            -e POB_LUA_ENABLED=true \
            -e POE_TRADE_ENABLED=false \
            "${IMAGE_NAME}:ci" \
            /opt/pob-mcp/scripts/mcp-smoke.mjs node /opt/pob-mcp/build/index.js

      - name: Prepare image tags
        if: github.event_name != 'pull_request'
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            POB_REF=${{ env.POB_REF }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
