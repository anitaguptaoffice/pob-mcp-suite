name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  repository_dispatch:
    types:
      - pob-updated
  workflow_dispatch:
    inputs:
      pob_ref:
        description: "PathOfBuilding ref to include"
        required: false
        default: "api-stdio"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pob-mcp
  POB_REF: ${{ github.event.client_payload.pob_ref || inputs.pob_ref || 'api-stdio' }}
  POB_SHORT_SHA: ${{ github.event.client_payload.short_sha || '' }}

jobs:
  build-test-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --build-arg POB_REF="${POB_REF}" \
            -t "${IMAGE_NAME}:ci" \
            .

      - name: Smoke image
        run: |
          docker run --rm \
            --entrypoint node \
            -e POB_LUA_ENABLED=true \
            -e POE_TRADE_ENABLED=false \
            "${IMAGE_NAME}:ci" \
            /opt/pob-mcp/scripts/mcp-smoke.mjs node /opt/pob-mcp/build/index.js

      - name: Prepare image tags
        if: github.event_name != 'pull_request'
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ -n "${POB_SHORT_SHA}" ]; then
              echo "${IMAGE_NAME}:pob-${POB_SHORT_SHA}"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image
        id: publish
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            POB_REF=${{ env.POB_REF }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Trigger marketplace update
        if: github.event_name == 'repository_dispatch' && github.event.action == 'pob-updated'
        env:
          GH_TOKEN: ${{ secrets.PATH_CHAIN_TOKEN }}
          IMAGE: ${{ env.IMAGE_NAME }}:pob-${{ github.event.client_payload.short_sha }}
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          POB_TAG: ${{ github.event.client_payload.pob_tag }}
          POB_SHA: ${{ github.event.client_payload.pob_sha }}
          SHORT_SHA: ${{ github.event.client_payload.short_sha }}
          POB_VERSION: ${{ github.event.client_payload.pob_version }}
          TREE_VERSION: ${{ github.event.client_payload.tree_version }}
        run: |
          gh api repos/anitaguptaoffice/pob-mcp-market/dispatches \
            -f event_type=pob-mcp-published \
            -f client_payload[image]="${IMAGE}" \
            -f client_payload[image_digest]="${IMAGE_DIGEST}" \
            -f client_payload[pob_mcp_ref]="${GITHUB_SHA}" \
            -f client_payload[pob_tag]="${POB_TAG}" \
            -f client_payload[pob_sha]="${POB_SHA}" \
            -f client_payload[short_sha]="${SHORT_SHA}" \
            -f client_payload[pob_version]="${POB_VERSION}" \
            -f client_payload[tree_version]="${TREE_VERSION}"
